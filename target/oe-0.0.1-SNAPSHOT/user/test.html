<form method="post">
    <div>
        <div>Email</div>
        <input name="email" value="${}">
    </div>
    <div>
        <div>Password</div>
        <input name="password" value="${}">
    </div>
    <div>
        <div>Fullname</div>
        <input name="fullname" value="${}">
    </div>
    <div>
        <div>Role</div>

    <div>

    </div>
    <div>

        <button formaction="/oe/user/update">Update</button>
        <a href="/oe/user/delete/${}">Delete</a>
        <a href="/oe/user/list">Reset</a>
    </div>
</form>
